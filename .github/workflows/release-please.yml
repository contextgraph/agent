name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Node 24 bundles npm >= 11.5.1, which Trusted Publishing (OIDC) requires.
          # This avoids the in-place `npm install -g npm@...` self-upgrade, which
          # corrupted the global install ("Cannot find module 'promise-retry'") and
          # silently broke the 0.5.0 publish.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run typecheck

      # Build before test: some suites exercise the compiled CLI (dist/index.js),
      # so dist/ must exist before `npm test` runs.
      - run: npm run build

      - run: npm test

      - run: npm publish --access public
